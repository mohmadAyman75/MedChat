<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>نوفا شات</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell" data-sidebar="open">
      <aside class="sidebar" aria-label="الشريط الجانبي للمحادثات">
        <div class="sidebar__top">
          <button class="project-title" type="button" id="projectTitleButton" aria-label="فتح المنيو" title="فتح المنيو">
            <i class="project-title__icon" data-lucide="aperture"></i>
            <span>GUI Deep ANN</span>
          </button>
          <button class="icon-button sidebar-toggle" type="button" aria-label="إظهار أو إخفاء الشريط الجانبي" title="إظهار أو إخفاء الشريط الجانبي">
            <i data-lucide="panel-right"></i>
          </button>
        </div>

        <button class="compose-button" type="button" id="newChatButton">
          <i data-lucide="square-pen"></i>
          <span>محادثة جديدة</span>
        </button>

        <button class="sidebar-search-button" type="button" id="searchButton">
          <i data-lucide="search"></i>
          <span>بحث في المحادثات</span>
        </button>

        <div class="sidebar-rail-actions" aria-label="اختصارات">
          <button class="rail-action" type="button" id="railPinnedButton" aria-label="المثبتة" title="المثبتة">
            <i data-lucide="pin"></i>
          </button>
          <button class="rail-action" type="button" id="railChatButton" aria-label="الشات" title="الشات">
            <i data-lucide="message-circle"></i>
          </button>
        </div>

        <div class="conversation-groups" id="conversationGroups" aria-live="polite"></div>

        <div class="sidebar__bottom">
          <button class="profile-button" type="button" id="profileButton">
            <span class="avatar">AH</span>
            <span class="profile-copy">
              <strong>AMRYB</strong>
              <small>مساحة عمل محلية</small>
            </span>
            <i data-lucide="more-horizontal"></i>
          </button>
        </div>
      </aside>

      <main class="main-panel">
        <header class="topbar">
          <div class="topbar__left">
            <button class="icon-button mobile-sidebar-toggle" type="button" aria-label="افتح الشريط الجانبي" title="افتح الشريط الجانبي">
              <i data-lucide="panel-right"></i>
            </button>
          </div>

          <div class="topbar__right">
            <button class="temporary-chat-button" type="button" id="temporaryChatButton" aria-label="محادثة مؤقتة" title="محادثة مؤقتة">
              <i data-lucide="clock-3"></i>
            </button>
            <button class="topbar-action" type="button" id="shareButton" aria-label="مشاركة المحادثة" title="مشاركة المحادثة" hidden>
              <i data-lucide="share"></i>
              <span>مشاركة</span>
            </button>
            <button class="icon-button" type="button" id="topChatMenuButton" aria-label="خيارات المحادثة" title="خيارات المحادثة" hidden>
              <i data-lucide="ellipsis"></i>
            </button>
          </div>
        </header>

        <section class="view-stack">
          <section class="chat-view" id="chatView" aria-label="الشات">
            <div class="message-scroll" id="messageScroll">
              <div class="empty-state" id="emptyState">
                <div class="empty-state__mark">
                  <i data-lucide="sparkles"></i>
                </div>
                <h1>إيه اللي حاسس بيه؟</h1>
                <div class="suggestion-grid" id="suggestionGrid">
                  <button type="button" data-prompt="عندي برد وكحة ورشح، أعمل إيه؟">
                    <i data-lucide="thermometer"></i>
                    <span>عندي برد</span>
                  </button>
                  <button type="button" data-prompt="بطني وجعاني ومش مرتاح، ممكن أعرف أتعامل إزاي؟">
                    <i data-lucide="activity"></i>
                    <span>بطني وجعاني</span>
                  </button>
                  <button type="button" data-prompt="عندي صداع شديد ومش عارف سببه، أعمل إيه؟">
                    <i data-lucide="brain"></i>
                    <span>صداع شديد</span>
                  </button>
                  <button type="button" data-prompt="حرارتي عالية وحاسس بتعب، أتصرف إزاي؟">
                    <i data-lucide="heart-pulse"></i>
                    <span>حرارة وتعب</span>
                  </button>
                </div>
              </div>
              <div class="messages" id="messages"></div>
            </div>

            <form class="composer" id="composer">
              <div class="attachment-row" id="attachmentRow" hidden></div>
              <div class="composer__box">
                <div class="composer-plus-wrap">
                  <input id="fileInput" type="file" multiple hidden />
                  <button class="composer-plus-button" type="button" id="attachButton" aria-label="الأدوات" title="الأدوات" aria-haspopup="menu" aria-expanded="false">
                    <i data-lucide="plus"></i>
                  </button>
                  <div class="composer-plus-menu" id="toolsMenu" role="menu" aria-label="Tools menu">
                    <button type="button" role="menuitem" data-plus-action="attach">
                      <i data-lucide="paperclip"></i>
                      <span>Add photos & files</span>
                    </button>
                    <button type="button" role="menuitem" data-plus-action="recent">
                      <i data-lucide="file-text"></i>
                      <span>Recent files</span>
                      <i data-lucide="chevron-right"></i>
                    </button>
                  </div>
                </div>
                <textarea
                  id="promptInput"
                  rows="1"
                  placeholder="اكتب اللي حاسس بيه"
                  autocomplete="off"
                ></textarea>
                <button class="composer-icon-button" type="button" id="micButton" aria-label="إدخال صوتي" title="إدخال صوتي">
                  <i data-lucide="mic"></i>
                </button>
                <button class="send-button" type="submit" id="sendButton" aria-label="إدخال صوتي" title="إدخال صوتي">
                  <i data-lucide="audio-lines"></i>
                </button>
              </div>
            </form>
          </section>
        </section>
      </main>
    </div>

    <div class="conversation-menu" id="conversationMenu" role="menu" aria-label="خيارات المحادثة" hidden>
      <button type="button" role="menuitem" data-menu-action="share">
        <i data-lucide="share"></i>
        <span>مشاركة</span>
      </button>
      <button type="button" role="menuitem" data-menu-action="group">
        <i data-lucide="user-plus"></i>
        <span>بدء محادثة جماعية</span>
      </button>
      <button type="button" role="menuitem" data-menu-action="rename">
        <i data-lucide="pencil"></i>
        <span>إعادة التسمية</span>
      </button>
      <button type="button" role="menuitem" data-menu-action="pin">
        <i data-lucide="pin"></i>
        <span id="menuPinLabel">تثبيت المحادثة</span>
      </button>
      <button type="button" role="menuitem" data-menu-action="archive">
        <i data-lucide="archive"></i>
        <span>أرشفة</span>
      </button>
      <button class="conversation-menu__danger" type="button" role="menuitem" data-menu-action="delete">
        <i data-lucide="trash-2"></i>
        <span>حذف</span>
      </button>
    </div>

    <div class="conversation-menu top-chat-menu" id="topChatMenu" role="menu" aria-label="خيارات الشات" hidden>
      <button type="button" role="menuitem" data-top-menu-action="group">
        <i data-lucide="user-plus"></i>
        <span>بدء محادثة جماعية</span>
      </button>
      <button type="button" role="menuitem" data-top-menu-action="files">
        <i data-lucide="files"></i>
        <span>عرض الملفات في الشات</span>
      </button>
      <button type="button" role="menuitem" data-top-menu-action="pin">
        <i data-lucide="pin"></i>
        <span id="topMenuPinLabel">تثبيت المحادثة</span>
      </button>
      <button type="button" role="menuitem" data-top-menu-action="archive">
        <i data-lucide="archive"></i>
        <span>أرشفة</span>
      </button>
      <button class="conversation-menu__danger" type="button" role="menuitem" data-top-menu-action="delete">
        <i data-lucide="trash-2"></i>
        <span>حذف</span>
      </button>
    </div>

    <div class="sheet" id="searchSheet" hidden>
      <div class="sheet__panel sheet__panel--wide" role="dialog" aria-modal="true" aria-labelledby="searchTitle">
        <div class="sheet__header">
          <h2 id="searchTitle">بحث في المحادثات</h2>
          <button class="icon-button" type="button" data-close-sheet aria-label="إغلاق" title="إغلاق">
            <i data-lucide="x"></i>
          </button>
        </div>
        <div class="search-dialog">
          <label class="search-dialog__field">
            <i data-lucide="search"></i>
            <input id="chatSearch" type="search" placeholder="اكتب اسم المحادثة" autocomplete="off" />
          </label>
          <div class="search-results" id="searchResults"></div>
        </div>
      </div>
    </div>

    <div class="sheet" id="profileSheet" hidden>
      <div class="sheet__panel" role="dialog" aria-modal="true" aria-labelledby="profileTitle">
        <div class="sheet__header">
          <h2 id="profileTitle">مساحة العمل</h2>
          <button class="icon-button" type="button" data-close-sheet aria-label="إغلاق" title="إغلاق">
            <i data-lucide="x"></i>
          </button>
        </div>
        <button class="sheet-row" type="button" id="exportButton">
          <i data-lucide="download"></i>
          <span>تصدير المحادثات</span>
        </button>
        <button class="sheet-row" type="button" id="clearButton">
          <i data-lucide="trash-2"></i>
          <span>مسح كل المحادثات</span>
        </button>
        <button class="sheet-row" type="button" id="themeButton">
          <i data-lucide="sun-moon"></i>
          <span>تغيير الثيم</span>
        </button>
      </div>
    </div>

    <div class="sheet" id="settingsSheet" hidden>
      <div class="sheet__panel sheet__panel--wide" role="dialog" aria-modal="true" aria-labelledby="settingsTitle">
        <div class="sheet__header">
          <h2 id="settingsTitle">الإعدادات</h2>
          <button class="icon-button" type="button" data-close-sheet aria-label="إغلاق" title="إغلاق">
            <i data-lucide="x"></i>
          </button>
        </div>
        <div class="settings-list">
          <label class="setting-row">
            <span>
              <strong>رسائل مضغوطة</strong>
              <small>تقليل المسافات في المحادثات الطويلة.</small>
            </span>
            <input type="checkbox" id="compactToggle" />
          </label>
          <label class="setting-row">
            <span>
              <strong>تسمية المحادثات تلقائيًا</strong>
              <small>استخدام أول رسالة كعنوان للمحادثة.</small>
            </span>
            <input type="checkbox" id="titleToggle" checked />
          </label>
          <label class="setting-row">
            <span>
              <strong>أسلوب الرد</strong>
              <small>يتحكم في نبرة مساعد الديمو المحلي.</small>
            </span>
            <select id="toneSelect">
              <option value="balanced">متوازن</option>
              <option value="concise">مختصر</option>
              <option value="detailed">مفصل</option>
            </select>
          </label>
        </div>
      </div>
    </div>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
